<!DOCTYPE html>
<html lang="nl" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andalus Projects | Bouw en Renovatie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; overflow: hidden; } /* منع التمرير حتى فتح الموقع */
        .bg-brand-orange { background-color: #f37321; }
        .text-brand-orange { color: #f37321; }
        .bg-brand-dark { background-color: #2d3436; }
        
        .hero-gradient {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1503387762-592dee58c460?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        /* واجهة القفل والانتظار */
        #coming-soon {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            color: white;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .password-input {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #f37321;
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            outline: none;
            width: 250px;
            text-align: center;
            transition: all 0.3s;
        }

        .password-input:focus { box-shadow: 0 0 15px rgba(243, 115, 33, 0.4); }

        .error-shake { animation: shake 0.5s; border-color: #ff4d4d; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .logo-svg { width: 80px; height: 80px; }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="bg-gray-50">

    <div id="coming-soon">
        <div class="text-center animate__animated animate__fadeIn">
            <svg class="logo-svg mx-auto mb-6" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                <path d="M256 40L40 220v252h140V330h152v142h140V220L256 40z" fill="#f37321"/>
            </svg>
            <h1 class="text-3xl font-bold mb-2 tracking-wide">ANDALUS PROJECTS</h1>
            <p class="text-brand-orange mb-8 uppercase tracking-[0.3em] text-sm">Protected Area</p>
            
            <div class="space-y-4">
                <input type="password" id="sitePass" class="password-input block mx-auto" placeholder="Wachtwoord invoeren">
                <button onclick="checkPassword()" class="bg-brand-orange text-white px-10 py-3 rounded-full font-bold hover:bg-orange-600 transition shadow-lg">
                    Access Website
                </button>
            </div>
            <p id="errorMsg" class="text-red-500 mt-4 text-sm font-medium opacity-0">Onjuist wachtwoord. Probeer het opnieuw.</p>
        </div>
    </div>

    <nav class="bg-brand-dark text-white sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <svg width="40" height="40" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <path d="M256 40L40 220v252h140V330h152v142h140V220L256 40z" fill="#f37321"/>
                </svg>
                <div class="leading-tight">
                    <span class="text-xl font-bold tracking-wider block">ANDALUS PROJECTS</span>
                </div>
            </div>
            <div class="hidden md:flex space-x-8 items-center">
                <a href="#home" class="hover:text-brand-orange">Home</a>
                <a href="#services" class="hover:text-brand-orange">Diensten</a>
                <a href="#contact" class="bg-brand-orange px-5 py-2 rounded-full">Offerte aanvragen</a>
            </div>
        </div>
    </nav>

    <section id="home" class="hero-gradient h-[80vh] flex items-center text-white">
        <div class="container mx-auto px-6">
            <h2 class="text-brand-orange font-bold text-xl mb-2 uppercase animate__animated animate__fadeInLeft">Professionele Bouw</h2>
            <h1 class="text-5xl md:text-7xl font-extrabold mb-6 animate__animated animate__fadeInLeft animate__delay-1s">EN RENOVATIEDIENSTEN</h1>
        </div>
    </section>

    <section id="services" class="py-20 bg-white reveal">
        <div class="container mx-auto px-6 text-center">
            <h2 class="text-4xl font-bold text-brand-dark mb-12">Onze Expertise</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="p-10 bg-gray-50 rounded-2xl border-b-4 border-brand-orange shadow-lg">Tegelwerk</div>
                <div class="p-10 bg-gray-50 rounded-2xl border-b-4 border-brand-orange shadow-lg">Schoonmaken</div>
                <div class="p-10 bg-gray-50 rounded-2xl border-b-4 border-brand-orange shadow-lg">Renovatie</div>
            </div>
        </div>
    </section>

    <script>
        function checkPassword() {
            const passInput = document.getElementById('sitePass');
            const errorMsg = document.getElementById('errorMsg');
            const overlay = document.getElementById('coming-soon');
            
            // كلمة المرور هنا
            const correctPass = "Andalus2024";

            if (passInput.value === correctPass) {
                // حركة خروج أنيقة للأعلى
                overlay.style.transform = "translateY(-100%)";
                document.body.style.overflow = "auto"; // السماح بالتمرير
                setTimeout(() => {
                    overlay.style.display = "none";
                }, 800);
            } else {
                // تأثير الخطأ
                passInput.classList.add('error-shake');
                errorMsg.style.opacity = "1";
                setTimeout(() => {
                    passInput.classList.remove('error-shake');
                }, 500);
            }
        }

        // السماح بالدخول عند الضغط على Enter
        document.getElementById('sitePass').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // تأثير ظهور العناصر عند التمرير
        window.addEventListener("scroll", function() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                if (elementTop < windowHeight - 150) {
                    reveals[i].classList.add("active");
                }
            }
        });
    </script>
</body>
</html>
