<!DOCTYPE html>
<html lang="nl" dir="ltr" style="user-select: none; -webkit-user-select: none; -ms-user-select: none; overflow-x: hidden;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andalus Projects | Meesters in Renovatie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --brand-orange: #f37321;
            --brand-orange-soft: rgba(243, 115, 33, 0.1);
            --bg-body: #1a1a1a; 
            --text-main: #f3f4f6; 
            --main-font: 'Myriad Pro', 'Myriad', 'Segoe UI', sans-serif;
        }

        /* --- STRICTOR PAGE LOCKING --- */
        * {
            user-select: none !important;
            -webkit-user-select: none !important;
            -webkit-touch-callout: none !important;
            -webkit-tap-highlight-color: transparent;
            outline: none !important;
        }

        html, body {
            overflow-x: hidden;
            width: 100%;
            position: relative;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--main-font);
            margin: 0; padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* --- REFINED MINI HERO TITLE --- */
        .hero-title {
            font-size: 2.8rem !important; /* Smaller, more modern scale */
            letter-spacing: -0.03em;
            line-height: 1.1;
            font-weight: 700;
            text-transform: uppercase;
            font-style: italic;
        }

        .hero-sub {
            font-size: 0.85rem !important;
            letter-spacing: 0.05em;
            opacity: 0.7;
            max-width: 400px;
        }

        @media (max-width: 768px) {
            .hero-title { font-size: 1.8rem !important; }
            .hero-sub { font-size: 0.75rem !important; }
            .container-custom { padding: 0 20px; }
        }

        .glass-header {
            background: rgba(26, 26, 26, 0.85) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--brand-orange-soft);
            border-top: 3px solid var(--brand-orange);
        }

        .hero-gradient {
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1920');
            background-size: cover; background-position: center;
            height: 100vh; display: flex; align-items: center;
        }

        .container-custom { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 25px; }

        .btn-modern {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 12px 28px;
            border-radius: 4px;
            transition: 0.3s;
        }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;"> 

    <nav class="fixed top-0 w-full z-50 glass-header">
        <div class="container-custom py-3 flex justify-between items-center">
            <a href="#" class="flex items-center gap-2">
                <img src="https://andalus-projects.com/Logo.png" alt="Logo" class="h-7">
                <span class="font-bold text-sm tracking-tight uppercase">ANDALUS <span class="text-brand-orange">PROJECTS</span></span>
            </a>
            <div class="hidden md:flex items-center gap-6 text-[9px] font-bold uppercase tracking-[0.2em]">
                <a href="#services" class="hover:text-brand-orange transition">Diensten</a>
                <a href="#contact" class="bg-brand-orange text-white px-4 py-2 rounded">Contact</a>
            </div>
        </div>
    </nav>

    <section id="home" class="hero-gradient">
        <div class="container-custom">
            <div class="max-w-xl">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-8 h-[1px] bg-brand-orange"></div>
                    <span class="text-[9px] font-bold uppercase tracking-[0.4em] text-brand-orange">Premium Quality</span>
                </div>
                <h1 class="hero-title text-white mb-4">
                   Vakmanschap in <br>Bouw & <span class="text-brand-orange">Renovatie</span>
                </h1>
                <p class="hero-sub text-gray-400 mb-8 leading-relaxed">
                   Gespecialiseerde renovatiediensten voor woningen en commerciële projecten. Wij combineren precisie met moderne esthetiek.
                </p>
                <div class="flex gap-4">
                    <a href="#services" class="btn-modern bg-brand-orange text-white">Projecten</a>
                    <a href="https://wa.me/32483404778" class="btn-modern border border-white/20 text-white hover:bg-white/5">Offerte</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center border-t border-white/5">
        <p class="text-gray-600 font-bold uppercase tracking-[0.3em] text-[8px]">&copy; 2026 Andalus Projects | Protected Content</p>
    </footer>

    <script>
        // DISABLE SHORTCUTS (F12, Ctrl+Shift+I, Ctrl+U, etc.)
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || 
                (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) || 
                (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) {
                return false;
            }
        };

        // PREVENT DRAGGING IMAGES
        document.querySelectorAll('img').forEach(img => {
            img.oncontextmenu = () => false;
            img.ondragstart = () => false;
        });
    </script>

</body>
</html>
